version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: postgres_demo
    restart: always
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
      POSTGRES_DB: demo_db
    ports:
      - "5434:5432"   # usa 5434 no host, já que 5432/5433 estão ocupadas
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
